{% extends "base.html" %}
{% block title %}{{ 'Editar' if accion=='editar' else 'Nuevo' }} Distribuidor{% endblock %}
{% block content %}
<div class="page-header"><h2>{{ 'Editar' if accion=='editar' else 'Nuevo' }} Distribuidor</h2></div>
<div class="card" style="max-width:700px"><div class="card-body">
<form method="POST" class="form-grid">
    <div class="form-group"><label>NIT</label><input class="form-control" name="nit" value="{{ distribuidor.nit if distribuidor else '' }}" required></div>
    <div class="form-group"><label>Razón social</label><input class="form-control" name="razon_social" value="{{ distribuidor.razon_social if distribuidor else '' }}" required></div>
    <div class="form-group"><label>Dirección</label><input class="form-control" name="direccion" value="{{ distribuidor.direccion if distribuidor else '' }}" required></div>
    <div class="form-group"><label>Ciudad</label><input class="form-control" name="ciudad" value="{{ distribuidor.ciudad if distribuidor else '' }}" required></div>
    <div class="form-group"><label>Zona</label><input class="form-control" name="zona" value="{{ distribuidor.zona if distribuidor else '' }}" required></div>
    <div class="form-group"><label>Contacto</label><input class="form-control" name="contacto_nombre" value="{{ distribuidor.contacto_nombre if distribuidor else '' }}" required></div>
    <div class="form-group"><label>Teléfono</label><input class="form-control" name="telefono" value="{{ distribuidor.telefono if distribuidor else '' }}" required></div>
    <div class="form-group"><label>Correo</label><input class="form-control" type="email" name="correo" value="{{ distribuidor.correo if distribuidor else '' }}" required></div>
    <div class="form-actions" style="grid-column:1/-1">
        <button class="btn btn-accent">Guardar</button>
        <a href="{{ url_for('distribuidores.listar') }}" class="btn btn-outline">Cancelar</a>
    </div>
</form>
</div></div>
{% endblock %}
